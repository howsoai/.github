name: Reusable WF - Create New Branch

on:
  workflow_call:
    inputs:
      branch:
        description: The name of the new branch to create
        type: string
        required: true
      repo:
        description: The repository to create a branch on
        type: string
        required: false
        default: ${{ github.repository }}

jobs:

  create-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.create-branch.outputs.branch }}

    steps:

    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.HOWSOAI_WORKFLOW_AUTOMATION_TOKEN }}
        ref: ${{ github.head_ref || github.event.pull_request.head.ref }}
        repository: ${{ inputs.repo }}
    
    - name: Create new branch
      id: create-branch
      run: |
        # On pull_request events, ref_name is a synthetic merge ref (e.g. 520/merge).
        # Use head_ref instead, which carries the real branch name.
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          CURRENT_BRANCH="${{ github.head_ref }}"
        else
          CURRENT_BRANCH="${{ github.ref_name }}"
        fi
        if [[ "${{ inputs.branch }}" == "$CURRENT_BRANCH" ]]; then
          echo "Branch input is the ref_name. Skipping."
          exit 0
        fi
        git config user.name "howso-automation"
        git config user.email "support@howso.com"
        echo "Creating branch ${{ inputs.branch }}"
        git checkout -b ${{ inputs.branch }}
        git push --set-upstream origin ${{ inputs.branch }}